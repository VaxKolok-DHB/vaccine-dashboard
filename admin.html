<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>จัดการผู้ใช้งาน</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>

body{
background:#f4f6fb;
padding:20px;
}

.top-card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.badge-role{
padding:6px 12px;
border-radius:20px;
color:white;
font-size:12px;
}

.user{
background:#2563eb;
}

.admin{
background:#9333ea;
}

.approved{
background:#16a34a;
}

.pending{
background:#f59e0b;
}

.timeline-card{

background:white;
padding:15px;
margin-bottom:10px;
border-radius:15px;
border-left:5px solid #3b82f6;

}

.login{
border-left-color:#22c55e;
}

.logout{
border-left-color:#ef4444;
}

.edit{
border-left-color:#f59e0b;
}

</style>

</head>

<body>
<div class="container">

<div class=" d-flex justify-content-between align-items-center
mb-4
">

<h2>
ตรวจการเข้าถึงเว็บไซต์
</h2>

<a
href="index.html"
class="
btn
btn-outline-secondary
">

⬅ กลับหน้าแรก

</a>

</div>
<div class="container">
<div class="top-card">

<div class="row mt-4">

<div class="col-md-6">

<input
id="searchInput"
class="form-control"
placeholder="🔍 ค้นหาชื่อ"
onkeyup="loadAdmin()"
>

</div>

<div class="col-md-6">

<select
id="roleFilter"
class="form-select"
onchange="loadAdmin()"
>

<option value="">
ทุก Role
</option>

<option value="admin">
admin
</option>

<option value="user">
user
</option>

</select>

</div>

</div>

<br>

<span
class="badge bg-warning"
>

⏳ รออนุมัติ :
<span id="pendingCount">

0

</span>

</span>

</div>



<div class="top-card">

<h3>

👥 รายชื่อผู้ใช้งาน

</h3>

<div class="table-responsive">

<table class="table">

<thead>



<tr>

<th>CID</th>
<th>ชื่อ</th>
<th>Role</th>
<th>สถานะ</th>
<th>จัดการ</th>

</tr>

</thead>

<tbody id="adminTable">

</tbody>

</table>

</div>

<div id="mobileList">

</div>

</div>



<div class="top-card">

<h3>

📋 ประวัติการใช้งาน

</h3>

<div id="activityTimeline">

</div>

</div>

</div>



<script>

const firebaseConfig = {
  apiKey: "HnOSpjSHma268VX3glsVJ9idzj9Uc1jjcqkJ7P11",
  authDomain: "vaccine-dashboard-bc687.firebaseapp.com",
  databaseURL: "https://vaccine-dashboard-bc687-default-rtdb.firebaseio.com/",
  projectId: "vaccine-dashboard-bc687",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function approveUser(id){

if(!confirm("อนุมัติผู้ใช้นี้ ?")) return;

db.ref("users/"+id).update({

status:"approved"

});

saveLog(
"อนุมัติผู้ใช้",
id
);

}

function changeRole(id,role){

db.ref(
"users/"+id
).update({

role:role

});

saveLog(
"เปลี่ยน Role",
id,
"",
role
);

}

function deleteUser(id){

if(
!confirm(
"ลบผู้ใช้นี้ ?"
)
) return;

db.ref(
"users/"+id
).remove();

saveLog(
"ลบผู้ใช้",
id
);

}
function loadAdmin(){

db.ref(
"users"
)

.on(

"value",

snap=>{

const data=
snap.val()||{};

let html="";

let pending=0;

const keyword=
document
.getElementById(
"searchInput"
)
.value
.toLowerCase();

const role=
document
.getElementById(
"roleFilter"
)
.value;


Object.keys(data)

.forEach(id=>{

const u=
data[id];

if(
u.status==="pending"
){

pending++;

}

if(

keyword &&
!u.name
?.toLowerCase()
.includes(
keyword
)

){

return;

}


if(

role &&
u.role!==role

){

return;

}


html+=`

<tr>

<td>

${u.cid||"-"}

</td>

<td>

${u.name||"-"}

</td>

<td>

<span
class="badge-role ${u.role}"
>

${u.role||"-"}

</span>

</td>

<td>

<span
class="badge-role ${u.status}"
>

${u.status||"-"}

</span>

</td>

<td>

<select
class="form-select form-select-sm"
onchange="changeRole('${id}',this.value)">

<option
value="user"
${u.role==="user"?"selected":""}>

user

</option>

<option
value="admin"
${u.role==="admin"?"selected":""}>

admin

</option>

</select>

${
u.status==="pending"

?

`<button
class="btn btn-success btn-sm w-100 mb-1"
onclick="approveUser('${id}')">

✅ อนุมัติ

</button>`

:

`<span
class="badge bg-success">

อนุมัติแล้ว

</span>`
}

<br>

<button
class="btn btn-danger btn-sm mt-1"
onclick="deleteUser('${id}')">

🗑 ลบ

</button>

</td>

</tr>

`;

});


document
.getElementById(
"adminTable"
)
.innerHTML=
html;


document
.getElementById(
"pendingCount"
)
.innerText=
pending;

});

}


function saveLog(
action,
detail="",
before="",
after=""
){

db.ref("loginLogs").push({

user:
localStorage.getItem("name")
||
"Unknown",

role:
localStorage.getItem("role")
||
"user",

action,
detail,
before,
after,

page:
location.pathname,

date:
new Date()
.toLocaleDateString("th-TH"),

time:
new Date()
.toLocaleTimeString("th-TH"),

timestamp:
Date.now()

});

}
function loadLogs(){

db.ref("loginLogs")

.limitToLast(
30
)

.on(

"value",

snap=>{

const data=
snap.val()||{};

let html="";


Object.keys(data)

.reverse()

.forEach(id=>{

const l=
data[id];

let type=
"edit";

if(
l.action==="เข้าสู่ระบบ"
){

type=
"login";

}

if(
l.action==="ออกจากระบบ"
){

type=
"logout";

}

html+=`

<div class="timeline-card ${type}">

<b>

👤 ${l.user||"-"}

</b>

<br>

📌 ${l.action||"-"}

<br>

${l.detail||"-"}

<br>

🕒 ${l.date||""}

${l.time||""}

</div>

`;

});


document
.getElementById(
"activityTimeline"
)
.innerHTML=
html;

});

}



document.addEventListener(

"DOMContentLoaded",

()=>{

loadAdmin();

loadLogs();

}

);

</script>

</body>
</html>
