<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>จัดการผู้ใช้งาน — VaxKolok</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f0;
  --surface:#ffffff;
  --surface2:#f7f9f7;
  --border:#dde5dd;
  --text:#1a2e1a;
  --muted:#6b7f6b;
  --hint:#9aab9a;
  --green:#2d6a4f;
  --green-light:#d8f0e4;
  --green-mid:#b7dfc9;
  --amber:#92600a;
  --amber-light:#fef3cd;
  --blue:#1d4e8a;
  --blue-light:#dbeafe;
  --red:#8b1a1a;
  --red-light:#fee2e2;
  --purple:#4c1d95;
  --purple-light:#ede9fe;
  --radius:12px;
  --radius-sm:8px;
  --font:'Sarabun',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;min-height:100vh;line-height:1.6}
.shell{max-width:1080px;margin:0 auto;padding:28px 20px 60px}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.brand{display:flex;align-items:center;gap:10px}
.brand-dot{width:10px;height:10px;border-radius:50%;background:var(--green)}
.brand h1{font-size:17px;font-weight:600;color:var(--text)}
.brand p{font-size:12px;color:var(--muted);margin-top:1px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:13px;text-decoration:none;font-family:var(--font);cursor:pointer;transition:color .15s,border-color .15s}
.back-btn:hover{color:var(--text);border-color:var(--green)}

/* pending alert banner */
.pending-banner{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:var(--radius);padding:14px 20px;margin-bottom:20px;display:none;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.pending-banner.show{display:flex}
.pending-banner-text{font-size:14px;font-weight:500;color:#78350f}
.pending-banner-text span{font-size:22px;font-weight:700;color:#92600a;margin-right:6px}
.pending-btn{padding:7px 14px;border-radius:var(--radius-sm);background:#92600a;color:#fff;border:none;font-size:13px;font-family:var(--font);font-weight:500;cursor:pointer}
.pending-btn:hover{opacity:.85}

/* stat row */
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;flex:1;min-width:120px}
.stat .val{font-size:26px;font-weight:600;line-height:1;margin-bottom:3px}
.stat .lbl{font-size:12px;color:var(--muted)}
.stat.s-all  .val{color:var(--text)}
.stat.s-wait .val{color:var(--amber)}
.stat.s-admin .val{color:var(--purple)}

/* card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;overflow:hidden}
.card-head{padding:16px 20px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;color:var(--text)}
.card-head .sub{font-weight:400;font-size:12px;color:var(--muted);margin-left:auto}

/* filters */
.filters{padding:14px 20px;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface2)}
.filters input,.filters select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:8px 12px;font-family:var(--font);font-size:13px;outline:none;transition:border-color .15s}
.filters input{flex:1;min-width:160px}
.filters input:focus,.filters select:focus{border-color:var(--green)}

/* loading bar */
.load-bar{height:2px;background:var(--border);overflow:hidden}
.load-inner{height:100%;width:35%;background:var(--green);animation:slide 1.1s ease-in-out infinite;border-radius:2px}
@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}

/* table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--surface2);border-bottom:1px solid var(--border)}
th{padding:10px 16px;text-align:left;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);font-weight:500}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f5fbf7}
td{padding:13px 16px;vertical-align:middle}
.cid{font-family:var(--mono);font-size:12px;color:var(--muted)}
.name{font-weight:500;font-size:14px;color:var(--text)}

/* row highlight for pending */
tbody tr.row-pending{background:#fffbeb}
tbody tr.row-pending:hover{background:#fef3cd}

/* badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:.2px;white-space:nowrap}
.badge.user    {background:var(--blue-light);color:var(--blue)}
.badge.admin   {background:var(--purple-light);color:var(--purple)}
.badge.approved{background:var(--green-light);color:var(--green)}
.badge.pending {background:var(--amber-light);color:var(--amber)}

/* action row */
.arow{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.role-sel{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font);font-size:12px;padding:5px 8px;cursor:pointer;outline:none}
.role-sel:focus{border-color:var(--green)}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;font-size:12px;font-family:var(--font);font-weight:500;cursor:pointer;border:none;transition:opacity .15s}
.btn:hover{opacity:.8}
.btn-ok {background:var(--green-light);color:var(--green)}
.btn-del{background:var(--red-light);color:var(--red)}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* empty */
.empty td{text-align:center;color:var(--muted);padding:36px;font-size:13px}

/* timeline */
.timeline{padding:4px 20px 16px;display:flex;flex-direction:column;gap:0}
.tl-row{display:flex;align-items:flex-start;gap:16px;padding:12px 0;border-bottom:1px solid var(--border)}
.tl-row:last-child{border-bottom:none}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.tl-dot.login  {background:var(--green)}
.tl-dot.logout {background:var(--red)}
.tl-dot.edit   {background:var(--amber)}
.tl-dot.approve{background:var(--blue)}
.tl-body{flex:1;min-width:0}
.tl-who{font-weight:500;font-size:13px;color:var(--text)}
.tl-act{font-size:12px;color:var(--muted);margin-top:1px}
.tl-time{font-family:var(--mono);font-size:11px;color:var(--hint);text-align:right;white-space:nowrap;flex-shrink:0;padding-top:2px}

/* toast */
#toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 18px;font-size:13px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.08);transform:translateY(12px);opacity:0;transition:all .22s ease;pointer-events:none;z-index:999;max-width:280px}
#toast.show{transform:translateY(0);opacity:1}

/* log category pills + export */
.log-toolbar{padding:14px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface2)}
.cat-pills{display:flex;gap:6px;flex-wrap:wrap}
.cat-pill{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--font)}
.cat-pill:hover{border-color:var(--green);color:var(--text)}
.cat-pill.active{background:var(--green);border-color:var(--green);color:#fff}
.btn-pdf{background:var(--green);color:#fff;padding:7px 14px;margin-left:auto}
.btn-pdf:hover{opacity:.88}
.tl-cat{font-weight:400;color:var(--hint);font-size:11px}
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      <div>
        <h1>VaxKolok — จัดการผู้ใช้งาน</h1>
        <p>ตรวจสอบการเข้าถึงและประวัติการใช้งาน</p>
      </div>
    </div>
    <a href="index.html" class="back-btn">← กลับหน้าแรก</a>
  </div>

  <!-- pending alert -->
  <div class="pending-banner" id="pendingBanner">
    <div class="pending-banner-text">
      <span id="pendingCount">0</span> คำขอรออนุมัติ — กรุณาตรวจสอบและอนุมัติผู้ใช้งานใหม่
    </div>
    <button class="pending-btn" onclick="filterPending()">ดูรายการรออนุมัติ</button>
  </div>

  <div class="stats">
    <div class="stat s-all">
      <div class="val" id="statTotal">—</div>
      <div class="lbl">ผู้ใช้ทั้งหมด</div>
    </div>
    <div class="stat s-wait">
      <div class="val" id="statPending">—</div>
      <div class="lbl">รออนุมัติ</div>
    </div>
    <div class="stat s-admin">
      <div class="val" id="statAdmin">—</div>
      <div class="lbl">แอดมิน</div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">รายชื่อผู้ใช้งาน</div>
    <div class="filters">
      <input id="searchInput" placeholder="ค้นหาชื่อ…" oninput="renderTable()">
      <select id="roleFilter" onchange="renderTable()">
        <option value="">ทุก Role</option>
        <option value="admin">admin</option>
        <option value="user">user</option>
      </select>
      <select id="statusFilter" onchange="renderTable()">
        <option value="">ทุกสถานะ</option>
        <option value="approved">approved</option>
        <option value="pending">pending</option>
      </select>
    </div>
    <div id="loadBar" class="load-bar"><div class="load-inner"></div></div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>CID</th><th>ชื่อ</th><th>Role</th><th>สถานะ</th><th>จัดการ</th>
          </tr>
        </thead>
        <tbody id="adminTable"></tbody>
      </table>
    </div>
  </div>

  <div class="card" id="logCard">
    <div class="card-head">
      ประวัติการทำงานทั้งหมด
      <span class="sub" id="logCountSub">กำลังโหลด…</span>
    </div>
    <div class="log-toolbar">
      <div class="cat-pills" id="catPills">
        <button type="button" class="cat-pill active" data-cat="all" onclick="setLogCategory('all',this)">ทั้งหมด</button>
        <button type="button" class="cat-pill" data-cat="auth" onclick="setLogCategory('auth',this)">เข้า-ออกระบบ</button>
        <button type="button" class="cat-pill" data-cat="user" onclick="setLogCategory('user',this)">จัดการผู้ใช้งาน</button>
        <button type="button" class="cat-pill" data-cat="child" onclick="setLogCategory('child',this)">ข้อมูลเด็ก/วัคซีน</button>
        <button type="button" class="cat-pill" data-cat="import" onclick="setLogCategory('import',this)">นำเข้า Excel</button>
      </div>
      <input type="month" id="logMonth" onchange="renderLogs()" title="กรองตามเดือน (เว้นว่าง = ทุกช่วงเวลา)" style="max-width:150px">
      <button type="button" class="btn btn-pdf" onclick="exportLogsPDF()">
        <i class="fa-solid fa-file-pdf"></i> บันทึกเป็น PDF
      </button>
    </div>
    <div class="timeline" id="activityTimeline">
      <div style="text-align:center;color:var(--muted);padding:24px;font-size:13px">กำลังโหลด…</div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ─── Auth guard ───────────────────────────────────────────
// เจ้าหน้าที่ (staff) ในระบบนี้ คือผู้ใช้ที่มี role = "admin"
// ฟังก์ชันนี้เช็คสิทธิ์แบบสดจาก localStorage ทุกครั้งที่เรียกใช้
// (ไม่ใช่เช็คครั้งเดียวตอนโหลดหน้า) เพื่อป้องกันกรณี session
// หมดอายุ / ถูกแก้ไข / ใช้เครื่องร่วมกันระหว่างการใช้งานหน้านี้
function isStaff() {
  return localStorage.getItem("user") && localStorage.getItem("role") === "admin";
}

(function() {
  if (!isStaff()) {
    alert("เฉพาะเจ้าหน้าที่ (ผู้ดูแลระบบ) เท่านั้นที่เข้าใช้งานหน้านี้ได้");
    location.href = "index.html";
  }
})();

// ─── Firebase ─────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "HnOSpjSHma268VX3glsVJ9idzj9Uc1jjcqkJ7P11",
  authDomain: "vaccine-dashboard-bc687.firebaseapp.com",
  databaseURL: "https://vaccine-dashboard-bc687-default-rtdb.firebaseio.com/",
  projectId: "vaccine-dashboard-bc687",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let usersCache = {};
let loaded = false;
let toastTimer;

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2800);
}

// ─── Filter to pending ────────────────────────────────────
function filterPending() {
  document.getElementById("statusFilter").value = "pending";
  renderTable();
  document.querySelector(".card").scrollIntoView({ behavior: "smooth" });
}

// ─── Render table ─────────────────────────────────────────
function renderTable() {
  const kw    = document.getElementById("searchInput").value.toLowerCase();
  const roleF = document.getElementById("roleFilter").value;
  const statF = document.getElementById("statusFilter").value;
  const staff = isStaff();
  let total = 0, pending = 0, adminCnt = 0, rows = "";

  // sort: pending first
  const entries = Object.entries(usersCache).sort((a, b) => {
    const ap = a[1].status === "pending" ? 0 : 1;
    const bp = b[1].status === "pending" ? 0 : 1;
    return ap - bp;
  });

  entries.forEach(([id, u]) => {
    total++;
    if (u.status === "pending") pending++;
    if (u.role === "admin") adminCnt++;
    if (kw    && !(u.name || "").toLowerCase().includes(kw)) return;
    if (roleF && u.role !== roleF)   return;
    if (statF && u.status !== statF) return;

    const isPending = u.status === "pending";
    rows += `<tr class="${isPending ? "row-pending" : ""}">
      <td class="cid">${u.cid || "—"}</td>
      <td class="name">${u.name || "—"} ${u.lastname || ""}</td>
      <td><span class="badge ${u.role || ''}">${u.role || "—"}</span></td>
      <td><span class="badge ${u.status || ''}">${isPending ? "⏳ รออนุมัติ" : "✓ อนุมัติแล้ว"}</span></td>
      <td><div class="arow">
        <select class="role-sel" onchange="changeRole('${id}',this.value)" ${staff ? "" : "disabled"}>
          <option value="user"  ${u.role === "user"  ? "selected" : ""}>user</option>
          <option value="admin" ${u.role === "admin" ? "selected" : ""}>admin</option>
        </select>
        ${isPending
          ? `<button class="btn btn-ok" onclick="approveUser('${id}')" ${staff ? "" : "disabled title=" + JSON.stringify("เฉพาะเจ้าหน้าที่เท่านั้น")}>อนุมัติ</button>`
          : `<span style="font-size:11px;color:var(--muted)">อนุมัติแล้ว</span>`}
        <button class="btn btn-del" onclick="deleteUser('${id}')" ${staff ? "" : "disabled"}>ลบ</button>
      </div></td>
    </tr>`;
  });

  document.getElementById("adminTable").innerHTML = rows ||
    `<tr class="empty"><td colspan="5">ไม่พบข้อมูลที่ตรงกัน</td></tr>`;
  document.getElementById("statTotal").textContent   = total;
  document.getElementById("statPending").textContent = pending;
  document.getElementById("statAdmin").textContent   = adminCnt;

  // pending banner
  const banner = document.getElementById("pendingBanner");
  document.getElementById("pendingCount").textContent = pending;
  banner.classList.toggle("show", pending > 0);
}

// ─── Load users (real-time) ───────────────────────────────
function loadAdmin() {
  db.ref("users").on("value", snap => {
    usersCache = snap.val() || {};
    if (!loaded) {
      document.getElementById("loadBar").style.display = "none";
      loaded = true;
    }
    renderTable();
  });
}

// ─── Actions ─────────────────────────────────────────────
function approveUser(id) {
  // เช็คสิทธิ์ซ้ำอีกชั้นตรงจุดที่ทำการอนุมัติจริง
  // เพื่อป้องกันไม่ให้ใครก็ตามที่ไม่ใช่เจ้าหน้าที่ (role admin) กดอนุมัติได้
  // แม้จะผ่านการเช็คตอนโหลดหน้ามาแล้วก็ตาม
  if (!isStaff()) {
    toast("เฉพาะเจ้าหน้าที่เท่านั้นที่สามารถอนุมัติได้");
    renderTable();
    return;
  }
  if (!confirm("อนุมัติผู้ใช้นี้?")) return;
  db.ref("users/" + id).update({ status: "approved" })
    .then(() => {
      toast("อนุมัติแล้ว");
      saveLog("อนุมัติผู้ใช้", usersCache[id]?.name || id);
    })
    .catch(e => toast("ผิดพลาด: " + e.message));
}

function changeRole(id, role) {
  if (!isStaff()) {
    toast("เฉพาะเจ้าหน้าที่เท่านั้นที่สามารถเปลี่ยน Role ได้");
    renderTable();
    return;
  }
  const before = usersCache[id]?.role || "";
  if (before === role) return;
  db.ref("users/" + id).update({ role })
    .then(() => {
      toast("เปลี่ยน Role เป็น " + role);
      saveLog("เปลี่ยน Role", usersCache[id]?.name || id, before, role);
    })
    .catch(e => toast("ผิดพลาด: " + e.message));
}

function deleteUser(id) {
  if (!isStaff()) {
    toast("เฉพาะเจ้าหน้าที่เท่านั้นที่สามารถลบผู้ใช้ได้");
    renderTable();
    return;
  }
  const name = usersCache[id]?.name || id;
  if (!confirm(`ลบผู้ใช้ "${name}"?`)) return;
  db.ref("users/" + id).remove()
    .then(() => {
      toast("ลบแล้ว: " + name);
      saveLog("ลบผู้ใช้", name);
    })
    .catch(e => toast("ผิดพลาด: " + e.message));
}

function saveLog(action, detail = "", before = "", after = "") {
  const n = new Date();
  db.ref("loginLogs").push({
    user: localStorage.getItem("name") || "Admin",
    role: localStorage.getItem("role") || "admin",
    action, detail, before, after,
    date: n.toLocaleDateString("th-TH"),
    time: n.toLocaleTimeString("th-TH"),
    timestamp: Date.now(),
  });
}

// ─── Activity log: รวม loginLogs (เข้า-ออกระบบ/จัดการผู้ใช้) + activityLogs (ข้อมูลเด็ก/วัคซีน) ──
const catLabel = {
  all: "ทั้งหมด", auth: "เข้า-ออกระบบ", user: "จัดการผู้ใช้งาน",
  child: "ข้อมูลเด็ก/วัคซีน", import: "นำเข้า Excel"
};
const USER_MGMT_ACTIONS = ["อนุมัติผู้ใช้", "เปลี่ยน Role", "ลบผู้ใช้"];

let allLogsCache  = [];
let loginLogsRaw  = null;
let activityLogsRaw = null;
let curCategory   = "all";

function classifyLog(l) {
  if (l._src === "login") {
    return USER_MGMT_ACTIONS.includes(l.action) ? "user" : "auth";
  }
  return l.action === "นำเข้า Excel" ? "import" : "child";
}

function setLogCategory(cat, el) {
  curCategory = cat;
  document.querySelectorAll("#catPills .cat-pill").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  renderLogs();
}

function loadLogs() {
  db.ref("loginLogs").on("value", snap => {
    loginLogsRaw = snap.val() || {};
    mergeAndRenderLogs();
  }, err => console.error("loginLogs:", err));

  db.ref("activityLogs").on("value", snap => {
    activityLogsRaw = snap.val() || {};
    mergeAndRenderLogs();
  }, err => console.error("activityLogs:", err));
}

function mergeAndRenderLogs() {
  if (loginLogsRaw === null || activityLogsRaw === null) return; // รอโหลดครบทั้งสอง node ก่อน
  const loginItems = Object.values(loginLogsRaw).map(l => ({ ...l, _src: "login" }));
  const actItems    = Object.values(activityLogsRaw).map(l => ({ ...l, _src: "activity" }));
  allLogsCache = [...loginItems, ...actItems]
    .map(l => ({ ...l, _cat: classifyLog(l) }))
    .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
  renderLogs();
}

function filteredLogs() {
  const monthVal = document.getElementById("logMonth")?.value; // "YYYY-MM" หรือว่าง
  let list = allLogsCache;
  if (curCategory !== "all") list = list.filter(l => l._cat === curCategory);
  if (monthVal) {
    const [y, m] = monthVal.split("-").map(Number);
    const start  = new Date(y, m - 1, 1).getTime();
    const end    = new Date(y, m, 1).getTime() - 1;
    list = list.filter(l => (l.timestamp || 0) >= start && (l.timestamp || 0) <= end);
  }
  return list;
}

function logDisplayFields(l) {
  const userName = l.user || l.name || "—";
  let action = l.action;
  if (!action) action = l.loginTime ? "เข้าสู่ระบบ" : (l.logoutTime ? "ออกจากระบบ" : "—");
  const timeStr = l.time || l.loginTime || l.logoutTime || "-";
  return { userName, action, timeStr };
}

function renderLogs() {
  const list = filteredLogs();
  const RENDER_CAP = 200;

  document.getElementById("logCountSub").textContent = `${list.length.toLocaleString("th-TH")} รายการ`;

  if (!list.length) {
    document.getElementById("activityTimeline").innerHTML =
      `<div style="text-align:center;color:var(--muted);padding:24px;font-size:13px">ไม่พบประวัติในตัวกรองนี้</div>`;
    return;
  }

  let html = list.slice(0, RENDER_CAP).map(l => {
    const { userName, action, timeStr } = logDisplayFields(l);

    let dot = "edit";
    if (action === "เข้าสู่ระบบ")   dot = "login";
    if (action === "ออกจากระบบ")    dot = "logout";
    if (action === "อนุมัติผู้ใช้") dot = "approve";

    const target = l.target ? ` — ${l.target}` : "";
    const extra  = (l.after && l.after !== "-")
      ? ` → ${l.after}`
      : (l.detail && l.detail !== userName ? ` (${l.detail})` : "");

    return `<div class="tl-row">
      <div class="tl-dot ${dot}"></div>
      <div class="tl-body">
        <div class="tl-who">${userName} <span class="tl-cat">· ${catLabel[l._cat] || "-"}</span></div>
        <div class="tl-act">${action}${target}${extra}</div>
      </div>
      <div class="tl-time">${l.date || ""}<br>${timeStr}</div>
    </div>`;
  }).join("");

  if (list.length > RENDER_CAP) {
    html += `<div style="text-align:center;color:var(--muted);padding:12px;font-size:12px">
      แสดง ${RENDER_CAP} จาก ${list.length.toLocaleString("th-TH")} รายการ — ใช้ตัวกรองเดือน/หมวดหมู่เพื่อดูเพิ่มเติม
      หรือกด "บันทึกเป็น PDF" เพื่อได้รายงานฉบับเต็ม
    </div>`;
  }

  document.getElementById("activityTimeline").innerHTML = html;
}

// ─── ส่งออกเป็น PDF (ตามหมวด/เดือนที่กำลังกรองอยู่) ─────────
function escapeHtml(s) {
  return String(s ?? "-").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

function exportLogsPDF() {
  const list = [...filteredLogs()].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
  if (!list.length) { toast("ไม่มีข้อมูลให้ส่งออกในตัวกรองนี้"); return; }

  const monthVal = document.getElementById("logMonth")?.value;
  const monthNames = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
    "กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  const periodLabel = monthVal
    ? (() => { const [y, m] = monthVal.split("-").map(Number); return `${monthNames[m-1]} ${y + 543}`; })()
    : "ทุกช่วงเวลา";
  const title = `รายงานประวัติการทำงาน — ${catLabel[curCategory]} (${periodLabel})`;

  const counts = { auth: 0, user: 0, child: 0, import: 0 };
  list.forEach(l => { counts[l._cat] = (counts[l._cat] || 0) + 1; });

  const rows = list.map(l => {
    const { userName, action, timeStr } = logDisplayFields(l);
    return `<tr>
      <td>${escapeHtml(l.date)}</td>
      <td>${escapeHtml(timeStr)}</td>
      <td>${escapeHtml(catLabel[l._cat])}</td>
      <td>${escapeHtml(action)}</td>
      <td>${escapeHtml(l.target || l.detail)}</td>
      <td>${escapeHtml(l.before)}</td>
      <td>${escapeHtml(l.after)}</td>
      <td>${escapeHtml(userName)}</td>
    </tr>`;
  }).join("");

  const html = `<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8">
<title>${title}</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}

  .stat{flex:1;min-width:110px;border:1.5px solid #dde5dd;border-radius:10px;padding:11px 14px;}
  .stat .n{font-size:22px;font-weight:700;}
  .stat .l{font-size:11.5px;color:#6b7f6b;}
  table{width:100%;border-collapse:collapse;font-size:11.5px;}
  th{background:#f7f9f7;text-align:left;padding:7px 9px;border-bottom:2px solid #dde5dd;font-size:10.5px;text-transform:uppercase;color:#6b7f6b;}
  td{padding:7px 9px;border-bottom:1px solid #eef2ee;vertical-align:top;}
  @media print { body{margin:8mm;} }
</style></head>
<body>
  <h1>${title}</h1>
  <div class="sub">ระบบ VaxKolok — ระบบติดตามวัคซีนเด็ก อ.สุไหงโก-ลก · สร้างรายงานเมื่อ ${escapeHtml(new Date().toLocaleString("th-TH"))} · ทั้งหมด ${list.length.toLocaleString("th-TH")} รายการ</div>
  <div class="stats">
    <div class="stat"><div class="n">${counts.auth}</div><div class="l">เข้า-ออกระบบ</div></div>
    <div class="stat"><div class="n">${counts.user}</div><div class="l">จัดการผู้ใช้งาน</div></div>
    <div class="stat"><div class="n">${counts.child}</div><div class="l">ข้อมูลเด็ก/วัคซีน</div></div>
    <div class="stat"><div class="n">${counts.import}</div><div class="l">นำเข้า Excel</div></div>
  </div>
  <table>
    <thead><tr><th>วันที่</th><th>เวลา</th><th>หมวดหมู่</th><th>การกระทำ</th><th>รายการ</th><th>ก่อน</th><th>หลัง</th><th>ผู้ทำรายการ</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <script>window.onload = () => setTimeout(() => window.print(), 400);<\/script>
</body></html>`;

  const w = window.open("", "_blank");
  if (!w) { toast("เบราว์เซอร์บล็อก pop-up กรุณาอนุญาตเพื่อสร้างรายงาน"); return; }
  w.document.open();
  w.document.write(html);
  w.document.close();
}
