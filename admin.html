<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#f1f5f9; font-family: system-ui; }
.mobile-card { display:none; }
@media(max-width:768px){
  table { display:none; }
  .mobile-card {
    display:block; background:white; border-radius:16px;
    padding:14px; margin-bottom:10px; box-shadow:0 4px 10px rgba(0,0,0,0.05);
  }
}
</style>
</head>
<body class="p-3">

<h5>👑 ผู้ใช้งานระบบ</h5>

<div class="d-flex gap-2 mb-3">
  <input type="text" id="search" class="form-control" placeholder="ค้นหา..." style="max-width:200px;">
  <select id="roleFilter" class="form-select" style="max-width:160px;">
    <option value="all">ทุก role</option>
    <option value="admin">admin</option>
    <option value="user">user</option>
  </select>
</div>

<div class="mb-3">
  <strong>📊 Login วันนี้:</strong> <span id="todayCount">0</span>
</div>

<div class="table-responsive">
  <table class="table table-bordered bg-white">
    <thead class="table-light">
      <tr>
        <th>CID</th><th>ชื่อ</th><th>Role</th><th>เวลา Login</th>
      </tr>
    </thead>
    <tbody id="adminTable"></tbody>
  </table>
</div>

<div id="mobileList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAFQ-qy8Dqwxj1MA1rt7YZ04mEzRzlPsaY",
  authDomain: "vaccine-dashboard-81107.firebaseapp.com",
  databaseURL: "https://vaccine-dashboard-81107-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "vaccine-dashboard-81107",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function formatDateTime(dateStr) {
  if (!dateStr) return "-";
  const d = new Date(dateStr); // ISO 8601 with Z → ใช้ได้เลย
  if (isNaN(d)) return "-";
  return d.toLocaleString("th-TH", {
    year: "numeric", month: "short", day: "numeric",
    hour: "2-digit", minute: "2-digit", second: "2-digit",
    timeZone: "Asia/Bangkok"
  });
}

function loadAdmin() {
  const keyword = document.getElementById("search").value.toLowerCase();
  const roleFilter = document.getElementById("roleFilter").value;

  // ✅ เปลี่ยน path จาก "users" → "loginLogs"
  db.ref("loginLogs").once("value", snap => {
    const data = snap.val() || {};
    let html = "", mobile = "", todayCount = 0;

    // วันนี้ตาม timezone ไทย
    const today = new Date().toLocaleDateString("en-CA", { timeZone: "Asia/Bangkok" }); // "2026-04-28"

    // เรียงตาม loginTime ล่าสุดก่อน
    const entries = Object.values(data).filter(Boolean).sort((a, b) => {
      return new Date(b.loginTime) - new Date(a.loginTime);
    });

    entries.forEach(u => {
      if (keyword &&
        !(u.name || "").toLowerCase().includes(keyword) &&
        !(u.cid || "").includes(keyword)
      ) return;

      if (roleFilter !== "all" && u.role !== roleFilter) return;

      // นับ login วันนี้ (เทียบ timezone ไทย)
      if (u.loginTime) {
        const loginDate = new Date(u.loginTime).toLocaleDateString("en-CA", { timeZone: "Asia/Bangkok" });
        if (loginDate === today) todayCount++;
      }

      const timeText = formatDateTime(u.loginTime);

      html += `
        <tr>
          <td>${u.cid || "-"}</td>
          <td>${u.name || "-"}</td>
          <td><span class="badge ${u.role === 'admin' ? 'bg-danger' : 'bg-primary'}">${u.role || "-"}</span></td>
          <td>${timeText}</td>
        </tr>`;

      mobile += `
        <div class="mobile-card">
          <div><b>${u.name || "-"}</b> <span class="badge ${u.role === 'admin' ? 'bg-danger' : 'bg-primary'}">${u.role || "-"}</span></div>
          <div>🆔 ${u.cid || "-"}</div>
          <div>🕒 ${timeText}</div>
        </div>`;
    });

    document.getElementById("adminTable").innerHTML = html || `<tr><td colspan="4" class="text-center text-muted">ไม่พบข้อมูล</td></tr>`;
    document.getElementById("mobileList").innerHTML = mobile;
    document.getElementById("todayCount").innerText = todayCount;
  });
}

loadAdmin();
document.getElementById("search").addEventListener("input", loadAdmin);
document.getElementById("roleFilter").addEventListener("change", loadAdmin);
</script>
</body>
</html>
