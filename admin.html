<html lang="th">
<head>

.user{

.admin{

.approved{
background:#16a34a;

.pending{

.timeline-card{

background:white;

.login{

<body>

<a

btn
btn-outline-secondary

<div class="row mt-4">

<tr>

<th>CID</th>
<th>ชื่อ</th>
<th>Role</th>
<th>สถานะ</th>

</tr>

</thead>

<tbody id="adminTable">

</tbody>

</table>

</div>

<div id="mobileList">

</div>

</div>



<div class="top-card">

<h3>

📋 ประวัติการใช้งาน

</h3>

<div id="activityTimeline">

</div>

</div>

</div>



<script>

const firebaseConfig = {
  apiKey: "HnOSpjSHma268VX3glsVJ9idzj9Uc1jjcqkJ7P11",
  authDomain: "vaccine-dashboard-bc687.firebaseapp.com",
  databaseURL: "https://vaccine-dashboard-bc687-default-rtdb.firebaseio.com/",
  projectId: "vaccine-dashboard-bc687",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();



function loadAdmin(){

db.ref(
"users"
)

.on(

"value",

snap=>{

const data=
snap.val()||{};

let html="";

let pending=0;

const keyword=
document
.getElementById(
"searchInput"
)
.value
.toLowerCase();

const role=
document
.getElementById(
"roleFilter"
)
.value;


Object.keys(data)

.forEach(id=>{

const u=
data[id];

if(
u.status==="pending"
){

pending++;

}

if(

keyword &&
!u.name
?.toLowerCase()
.includes(
keyword
)

){

return;

}


if(

role &&
u.role!==role

){

return;

}


html+=`

<tr>

<td>

${u.cid||"-"}

</td>

<td>

${u.name||"-"}

</td>

<td>

<span
class="badge-role ${u.role}"
>

${u.role||"-"}

</span>

</td>

<td>

<span
class="badge-role ${u.status}"
>

${u.status||"-"}

</span>

</td>

<td>

-

</td>

</tr>

`;

});


document
.getElementById(
"adminTable"
)
.innerHTML=
html;


document
.getElementById(
"pendingCount"
)
.innerText=
pending;

});

}


function loadLogs(){

db.ref(
"logs"
)

.limitToLast(
100
)

.on(

"value",

snap=>{

const data=
snap.val()||{};

let html="";

Object.keys(data)

.reverse()

.forEach(id=>{

const l=
data[id];

html+=`

<div class="timeline-card">

<div class="d-flex justify-content-between">

<div>

<b>

👤 ${l.user||"-"}

</b>

<span class="badge bg-primary">

${l.role||"user"}

</span>

<br>

📌 ${l.action||"-"}

<br>

📝 ${l.detail||"-"}

<br>

${
l.before
?

`🔹ก่อน:
${l.before}
<br>`

:

""
}

${
l.after
?

`🔸หลัง:
${l.after}
<br>`

:

""
}

</div>

<div>

🕒
${l.date}
<br>
${l.time}

</div>

</div>

</div>

`;

});

document
.getElementById(
"activityTimeline"
)
.innerHTML=
html;

});

}

oldVaccine
),

JSON.stringify(
newVaccine
)

);

saveLog(
"เข้าสู่ระบบ",
"Login"
);

function saveLog(
action,
detail="",
before="",
after=""
){

const user=
localStorage.getItem("name")
||
"Unknown";

const role=
localStorage.getItem("role")
||
"user";

db.ref("loginLogs")
.push({

name:user,

role:role,

action:action,

detail:detail,

before:before,

after:after,

date:
new Date()
.toLocaleDateString(
"th-TH"
),

time:
new Date()
.toLocaleTimeString(
"th-TH"
),

timestamp:
Date.now()

});

}


function logout(){

saveLog(
"ออกจากระบบ",
"Logout"
);

localStorage.removeItem(
"user"
);

localStorage.removeItem(
"name"
);

localStorage.removeItem(
"role"
);

window.location=
"login.html";

}
document.addEventListener(

"DOMContentLoaded",

()=>{

loadAdmin();

loadLogs();



}
);



</script>

</body>
</html>
