<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>

body{
background:#f1f5f9;
padding:15px;
font-family:system-ui;
}

.top-card{
background:white;
padding:20px;
border-radius:18px;
margin-bottom:15px;
box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.mobile-card{
display:none;
}

.log-card{
display:none;
}

table{
border-radius:15px;
overflow:hidden;
}

@media(max-width:768px){

table{
display:none;
}

.mobile-card,
.log-card{

display:block;
background:white;
padding:15px;
margin-bottom:10px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,.05);

}

}

</style>

</head>

<body>

<div class="top-card">

<h4>👑 จัดการผู้ใช้งาน</h4>

<div class="row mt-3">

<div class="col">

<input
id="search"
class="form-control"
placeholder="🔍 ค้นหาชื่อ">

</div>

<div class="col">

<select
id="roleFilter"
class="form-select">

<option value="all">
ทุก Role
</option>

<option value="admin">
Admin
</option>

<option value="user">
User
</option>

</select>

</div>

</div>

<div class="mt-3">

<span class="badge bg-warning">

⏳ รออนุมัติ :
<span id="pendingCount">

0

</span>

</span>

</div>

</div>


<div class="top-card">

<h4>👥 รายชื่อผู้ใช้งาน</h4>

<div class="table-responsive">

<div class="text-end">

<button
class="btn btn-danger"
onclick="logout()">

🚪 ออกจากระบบ

</button>

</div>





<table class="table bg-white">

<thead>

<tr>

<th>เลขบัตร</th>
<th>ชื่อ</th>
<th>Role</th>
<th>สถานะ</th>
<th>จัดการ</th>

</tr>

</thead>

<tbody id="adminTable">

</tbody>

</table>

</div>

<div id="mobileList"></div>

</div>


<div class="top-card">

<h4>📋 ประวัติการใช้งาน</h4>

<div class="table-responsive">

<table class="table">

<thead>

<tr>

<th>ผู้ใช้</th>
<th>การกระทำ</th>
<th>รายละเอียด</th>
<th>วันที่</th>
<th>🟢 เวลาเข้า</th>
<th>🔴 เวลาออก</th>

</tr>

</thead>

<tbody id="logTable">

</tbody>

</table>

</div>

<div id="mobileLog"></div>

</div>



<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase.js"></script>

<script>

const firebaseConfig = {
  apiKey: "HnOSpjSHma268VX3glsVJ9idzj9Uc1jjcqkJ7P11",
  authDomain: "vaccine-dashboard-bc687.firebaseapp.com",
  databaseURL: "https://vaccine-dashboard-bc687-default-rtdb.firebaseio.com/",
  projectId: "vaccine-dashboard-bc687",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();



// =========================
// 📋 Activity Log
// =========================

function saveLog(
action,
detail
){

const user=

localStorage.getItem(
"name"
)

||
"Unknown";

const now=
new Date();

const id=
Date.now();


db.ref(
"logs/"+id
)

.set({

user:user,

action:action,

detail:detail,

date:
now.toLocaleDateString(
"th-TH"
),

time:
now.toLocaleTimeString(
"th-TH",
{

hour:"2-digit",

minute:"2-digit",

second:"2-digit"

})

});

}


function logout(){

const user=

localStorage.getItem(
"name"
)

||
"Unknown";


saveLog(

"ออกจากระบบ",

`${user}
ออกจากระบบ`

);


localStorage.clear();

window.location=
"login.html";

}



function maskCid(cid){

if(!cid)return "-";

return cid.substring(0,4)+
"XXXXX"+
cid.substring(9);

}



function loadAdmin(){

let keyword=
document
.getElementById(
"search"
)
.value
.toLowerCase();

let role=
document
.getElementById(
"roleFilter"
)
.value;


db.ref("users")

.once("value",snap=>{

let data=
snap.val()||{};

let html="";
let mobile="";
let pending=0;


Object.keys(data)
.forEach(cid=>{

let u=data[cid];

let status=
u.status||
"pending";

if(
keyword &&
!(u.name||"")
.toLowerCase()
.includes(keyword)
){

return;

}


if(
role!="all"
&&
u.role!=role
){

return;

}


if(
status==="pending"
){

pending++;

}


const badge=

status==="approved"

?

"bg-success"

:

status==="rejected"

?

"bg-danger"

:

"bg-warning";



html+=`

<tr>

<td>${maskCid(u.cid)}</td>

<td>

${u.name}
${u.lastname||""}

</td>

<td>

<span class="badge bg-primary">

${u.role||"user"}

</span>

</td>

<td>

<span class="badge ${badge}">

${status}

</span>

</td>

<td>

${
status==="pending"

?

`

<button
class="btn btn-success btn-sm me-1"
onclick="approveUser('${u.cid}')">

✅

</button>

<button
class="btn btn-danger btn-sm"
onclick="rejectUser('${u.cid}')">

❌

</button>

`

:

`-`

}

</td>

</tr>

`;



mobile+=`

<div class="mobile-card">

<h6>

${u.name}
${u.lastname||""}

</h6>

<div>

🆔 ${maskCid(u.cid)}

</div>

<div class="mt-2">

<span class="badge ${badge}">

${status}

</span>

</div>

</div>

`;

});


adminTable.innerHTML=
html;

mobileList.innerHTML=
mobile;

pendingCount.innerText=
pending;

});

}



function saveLog(action,detail){

const user=

localStorage
.getItem("name")

||"Admin";


const now=
new Date();

const date=
now.toLocaleDateString(
"th-TH"
);

const time=
now.toLocaleTimeString(
"th-TH",
{
hour:"2-digit",
minute:"2-digit"
}
);

const id=
Date.now();


db.ref(
"logs/"+id
)

.set({

user:user,
action:action,
detail:detail,
date:date,
login:time,
logout:time

});

}



function loadLogs(){

db.ref(
"logs"
)

.limitToLast(20)

.on(
"value",
snap=>{

const data=
snap.val()||{};

let html="";
let mobile="";


Object.keys(data)

.reverse()

.forEach(id=>{

let l=
data[id];


html+=`

<tr>

<td>${l.user}</td>

<td>${l.action}</td>

<td>${l.detail}</td>

<td>${l.date}</td>

<td>
${
l.action==="เข้าสู่ระบบ"

?

l.time

:

"-"

}
</td>

<td>
${
l.action==="ออกจากระบบ"

?

l.time

:

"-"

}
</td>

</tr>

`;


mobile+=`

<div class="log-card">

<b>

${l.user}

</b>

<hr>

<div>

📌 ${l.action}

</div>

<div>

${l.detail}

</div>

<div>

📅 ${l.date}

</div>

<div>

🟢 ${l.login}

</div>

<div>

🔴 ${l.logout}

</div>

</div>

`;

});


logTable.innerHTML=
html;

mobileLog.innerHTML=
mobile;

});

}



function approveUser(cid){

db.ref(
"users/"+cid
)

.update({

status:"approved"

})

.then(()=>{

saveLog(

"อนุมัติผู้ใช้",

`อนุมัติ:

${cid}`

);

loadAdmin();

});

}



function rejectUser(cid){

db.ref(
"users/"+cid
)

.update({

status:"rejected"

})

.then(()=>{

saveLog(
"ปฏิเสธผู้ใช้",
"ปฏิเสธ "+cid
);

loadAdmin();

});

}



loadAdmin();

loadLogs();


search
.addEventListener(
"input",
loadAdmin
);


roleFilter
.addEventListener(
"change",
loadAdmin
);

</script>

</body>
</html>
