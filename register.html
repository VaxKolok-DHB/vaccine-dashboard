<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สมัครสมาชิก</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f5f7fb;
}

.card{
  border-radius:12px;
  border:none;
}

.form-control{
  border-radius:8px;
  padding:12px;
}

.btn-primary{
  background:#2ec4c7;
  border:none;
  border-radius:8px;
  padding:12px;
}

.btn-primary:hover{
  background:#25a9ac;
}

.btn-light{
  border-radius:8px;
  padding:12px;
}
</style>

</head>

<body>

<div class="container py-5">
  <div class="card p-4 mx-auto" style="max-width:500px">

    <h3 class="mb-1">สมัครสมาชิก</h3>
    <p class="text-muted mb-4">กรอกข้อมูลเพื่อเข้าใช้งานระบบ</p>

    <!-- ชื่อ -->
    <label>ชื่อ</label>
    <input type="text" id="name" class="form-control mb-3" placeholder="ชื่อ">

    <!-- นามสกุล -->
    <label>นามสกุล</label>
    <input type="text" id="lastname" class="form-control mb-3" placeholder="นามสกุล">

    <!-- เลขบัตร -->
    <label>เลขบัตรประชาชน</label>
    <input type="text" id="cid" class="form-control mb-3"
      placeholder="เลขบัตร 13 หลัก"
      maxlength="13"
      oninput="this.value=this.value.replace(/[^0-9]/g,'')">

    <!-- Email -->
    <label>Email</label>
    <input type="email" id="email" class="form-control mb-3" placeholder="example@email.com">

    <!-- เบอร์ -->
    <label>เบอร์โทร</label>
    <input type="text" id="phone" class="form-control mb-3"
      placeholder="เบอร์โทร"
      maxlength="10"
      oninput="this.value=this.value.replace(/[^0-9]/g,'')">

    <!-- ปุ่ม -->
    <div class="d-flex gap-2 mt-3">
      <button onclick="register()" class="btn btn-primary w-100">
        สมัคร
      </button>

      <button onclick="window.location.href='login.html'" class="btn btn-light w-100">
        ยกเลิก
      </button>
    </div>

    <p id="msg" class="text-danger text-center mt-3"></p>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script src="app.js"></script>

</body>
</html>
