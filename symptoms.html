<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
ติดตามอาการหลังฉีดวัคซีน
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>

body{
background:#f4f6fb;
padding:20px;
}

.card{
border:none;
border-radius:20px;

box-shadow:
0 2px 10px rgba(0,0,0,.05);
}

.summary{
font-size:30px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class=" d-flex justify-content-between align-items-center
mb-4
">

<h2>
📊 ติดตามอาการหลังฉีดวัคซีน
</h2>

<a
href="index.html"
class="
btn
btn-outline-secondary
">

⬅ กลับหน้าแรก

</a>

</div>


<div class="row mb-4">

<div class="col-md-3">

<div class="card p-3">

<div>
👶 ทั้งหมด
</div>

<div
id="totalCount"
class="summary">

0

</div>

</div>

</div>


<div class="col-md-3">

<div class="card p-3">

<div>
🟢 ปกติ
</div>

<div
id="normalCount"
class="summary">

0

</div>

</div>

</div>


<div class="col-md-3">

<div class="card p-3">

<div>
🟠 ต้องติดตาม
</div>

<div
id="warningCount"
class="summary">

0

</div>

</div>

</div>


<div class="col-md-3">

<div class="card p-3">

<div>
🔴 ต้องติดตามใกล้ชิด
</div>

<div
id="criticalCount"
class="summary">

0

</div>

</div>

</div>

</div>


<div class="mb-3">

<input
type="text"
id="searchHN"
class="form-control"
placeholder="🔍 ค้นหา HN หรือชื่อเด็ก..."
onkeyup="loadSymptoms()"
>

</div>

<div id="symptomList"></div>

</div>


<script>

const firebaseConfig={

apiKey:"HnOSpjSHma268VX3glsVJ9idzj9Uc1jjcqkJ7P11",

authDomain:
"vaccine-dashboard-bc687.firebaseapp.com",

databaseURL:
"https://vaccine-dashboard-bc687-default-rtdb.firebaseio.com/",

projectId:
"vaccine-dashboard-bc687"

};


if(!firebase.apps.length){

firebase.initializeApp(
firebaseConfig
);

}

const db = firebase.database();

function markDone(id){

const staff =
localStorage.getItem("username") ||
localStorage.getItem("name") ||
"เจ้าหน้าที่";

db.ref("symptoms/" + id)
.once("value")
.then(snap => {

  const s = snap.val() || {};

  if(!s.assignedTo){

    db.ref("symptoms/" + id).update({

      status: "กำลังติดตาม",
      assignedTo: staff,
      followedAt: Date.now()

    });

  }else{

    db.ref("symptoms/" + id).update({

      status: "ติดตามเสร็จ",
      level: "🟢 ปกติ",
      assignedTo: staff,
      priority: 99,
      closedAt: Date.now()

    });

  }

});

}



function loadSymptoms(){

const container =
document.getElementById("symptomList");

if(!container) return;

db.ref("symptoms").off();

db.ref("symptoms").on("value", snap => {

const data = snap.val() || {};

container.innerHTML = "";

const keyword =
  document.getElementById("searchHN")
  ?.value
  .toLowerCase() || "";

const entries =

Object.entries(data)

.filter(([k,s]) => {

  const hn =
    String(s.hn || "")
    .toLowerCase();

  const name =
    String(s.name || "")
    .toLowerCase();

  return (
    hn.includes(keyword) ||
    name.includes(keyword)
  );

})

.sort((a,b)=>{

  const p1 = a[1].priority || 99;
  const p2 = b[1].priority || 99;

  if(p1 !== p2){
    return p1 - p2;
  }

  return (b[1].time || 0) - (a[1].time || 0);

});

let total = 0;
let normal = 0;
let warning = 0;
let critical = 0;

entries.forEach(([key,s]) => {

  total++;

  if((s.level || "").includes("🟢")){
    normal++;
  }
  else if((s.level || "").includes("🔴")){
    critical++;
  }
  else{
    warning++;
  }

  let color = "#22c55e";

  if((s.level || "").includes("🟠")){
    color = "#f59e0b";
  }

  if((s.level || "").includes("🔴")){
    color = "#ef4444";
  }

  if(s.status === "กำลังติดตาม"){
    color = "#3b82f6";
  }

  let vaccineText = "ไม่มีข้อมูล";

  if(s.vaccines){

    const vaccineValues =
      Object.values(s.vaccines);

    if(vaccineValues.length){

      const latestDate =
        vaccineValues
        .sort()
        .pop();

      const latestVaccines =
        Object.entries(s.vaccines)
        .filter(([k,v]) =>
          v === latestDate
        );

      vaccineText =
        latestVaccines
        .map(([k,v]) =>
          `${k} (${v})`
        )
        .join("<br>");

    }

  }

  const card =
    document.createElement("div");

  card.className =
    "card p-3 mb-3";

  if(
    (s.level || "")
    .includes("🔴")
  ){
    card.style.border =
      "2px solid red";
  }

  card.innerHTML = `
  📍 รอบติดตาม :
${(s.followStep || 0) + 1}

✅ ปกติ :
${s.normalCount || 0}/4 ครั้ง

⏭ ติดตามครั้งถัดไป :
${
s.nextFollowUp
? new Date(s.nextFollowUp).toLocaleString("th-TH")
: "-"
}

  <div class="d-flex justify-content-between">

    <div>

      <h5>
      👶 ${s.name || "-"}
      </h5>

      <div>
      🆔 HN:
      ${s.hn || "-"}
      </div>

      <div>
      📞
      ${s.phone || "-"}
      </div>

    </div>

    <div>

      <span
      class="badge"
      style="
      background:${color};
      padding:10px">

      ${s.level || "-"}

      </span>

    </div>

  </div>

  <hr>

  <div>

  💉 <b>วัคซีนล่าสุด:</b>

  <br>

  ${vaccineText}

  </div>

  <br>

  <div>

  🩺 <b>อาการ:</b>

  ${s.symptom || "-"}

  </div>

  <div class="mt-2">

  📌 ${s.status || "-"}

  </div>

  <div class="mt-2">

  📍 รอบติดตาม :
  ${(s.followStep || 0) + 1}

  </div>

  <div class="mt-2">

  ✅ ปกติ :
  ${s.normalCount || 0}/4 ครั้ง

  </div>

  <div class="mt-2">

  ⏭ ติดตามครั้งถัดไป :

  ${
    s.nextFollowUp
    ? new Date(
        s.nextFollowUp
      ).toLocaleString("th-TH")
    : "-"
  }

  </div>

  <div class="mt-2">

  👩‍⚕️

  ${
    s.assignedTo
    ? `เจ้าหน้าที่: ${s.assignedTo}`
    : "ยังไม่มีผู้รับเคส"
  }

  </div>

  <div class="mt-2 text-muted">

  ⏰

  ${
    s.time
    ? new Date(
        s.time
      ).toLocaleString("th-TH")
    : "-"
  }

  </div>

  <button
  onclick="markDone('${key}')"
  class="btn ${
    s.assignedTo
    ? "btn-success"
    : "btn-warning"
  } w-100 mt-3">

  ${
    s.assignedTo
    ? "✅ จบเคส"
    : "👩‍⚕️ รับเคส"
  }

  </button>

  `;

  container.appendChild(card);

});

document.getElementById("totalCount").innerText = total;
document.getElementById("normalCount").innerText = normal;
document.getElementById("warningCount").innerText = warning;
document.getElementById("criticalCount").innerText = critical;

});

}

document.addEventListener(
"DOMContentLoaded",
() => {
loadSymptoms();
}
);



</script>

</body>
</html>
