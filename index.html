<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>เข้าสู่ระบบ</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f4f6fb;
  font-family: 'Segoe UI', sans-serif;
}

.login-box{
  max-width:400px;
  margin:auto;
  margin-top:80px;
}

.card{
  border:none;
  border-radius:12px;
  padding:30px;
}

.form-control{
  height:50px;
  border-radius:8px;
  border:1px solid #e5e7eb;
  font-size:16px;
}

.form-control::placeholder{
  color:#9ca3af;
}

.btn-login{
  background:#2ec4c7;
  color:white;
  height:50px;
  border-radius:8px;
  font-weight:600;
}

.btn-login:hover{
  background:#26a6a9;
}

.extra{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:15px;
  font-size:14px;
}

.fb-btn{
  background:#3b5998;
  color:white;
  border-radius:8px;
  height:45px;
  margin-top:15px;
}

.fb-btn:hover{
  background:#2d4373;
}
</style>

</head>

<body>

<div class="login-box">
  <div class="card">

    <h3 class="mb-2">ยินดีตอนรับเข้าสู่ระบบ</h3>
    <p class="text-muted mb-4">กรุณากรอกข้มูลเพื่อเข้าสู่ระบบ</p>

    <!-- 🔥 input -->
    <input type="text" id="cid" class="form-control mb-3"
      placeholder="เลขบัตรประชาชน"
      maxlength="13"
      required
      pattern="\d{13}"
      oninput="this.value=this.value.replace(/[^0-9]/g,'')">

    <!-- 🔥 button -->
    <button onclick="login()" class="btn btn-login w-100">
      เข้าสู่ระบบ
    </button>


    <!-- 🔥 register -->
    <div class="text-center mt-4">
      <span class="text-muted">กรุณาลงทะเบียนสมาชิกใช้งาน </span>
      <a href="register.html" class="fw-bold text-info">สมัครสมาชิกใช้งาน</a>
    </div>

    <p id="msg" class="text-danger text-center mt-2"></p>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<!-- icon -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>

<script src="app.js"></script>


</body>
</html>
