<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>เข้าสู่ระบบ — VaxKolok DHB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f7fa;
  --surface:#ffffff;
  --surface2:#f5f7fb;
  --border:#e3e8ef;
  --text:#0d1b2a;
  --muted:#5a6a8a;
  --hint:#a0aec0;
  --green:#059669;
  --green-hover:#047857;
  --green-light:#ecfdf5;
  --red:#8b1a1a;
  --red-light:#fee2e2;
  --radius:16px;
  --radius-sm:10px;
  --font:'IBM Plex Sans Thai',system-ui,sans-serif;
}
body{
  background:var(--bg);
  font-family:var(--font);
  font-size:15px;
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
}

.box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:36px 26px 32px;
  width:100%;
  max-width:520px;
  box-shadow:0 2px 16px rgba(5,150,105,.07);
}

/* logo */
.logo-wrap{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:24px;
}
.logo-wrap img{
  width:68px;
  height:68px;
  object-fit:contain;
  flex-shrink:0;
}
.logo-text h2{
  font-size:17px;
  font-weight:700;
  line-height:1.2;
  color:var(--text);
}
.logo-text h2 span{color:var(--green)}
.logo-text p{
  font-size:12px;
  color:var(--muted);
  margin-top:2px;
}

.divider{
  height:1px;
  background:var(--border);
  margin-bottom:24px;
}

/* field */
.field{margin-bottom:16px}
.field label{
  display:block;
  font-size:13px;
  font-weight:500;
  color:var(--muted);
  margin-bottom:6px;
}
.field input{
  width:100%;
  height:50px;
  background:var(--surface2);
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);
  font-family:var(--font);
  font-size:15px;
  padding:0 14px;
  outline:none;
  transition:border-color .15s,background .15s;
  letter-spacing:.5px;
}
.field input:focus{border-color:var(--green);background:#fff}
.field input::placeholder{color:var(--hint);letter-spacing:0}
.field .err{font-size:12px;color:var(--red);margin-top:5px;display:none}
.field.has-err input{border-color:var(--red)}
.field.has-err .err{display:block}

/* cid digit boxes — จัดวางแบบทางการ ตามรูปแบบเลขบัตรประชาชนไทย 1-2345-67890-12-1 */
.field label.cid-label{
  font-size:12px;
  font-weight:600;
  color:var(--muted);
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-bottom:10px;
}
.cid-panel{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:14px 8px;
  overflow-x:auto;
}
.cid-boxes{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:3px;
  flex-wrap:nowrap;
  width:max-content;
  margin:0 auto;
}
.field .cid-digit{
  width:24px;
  height:40px;
  padding:0;
  text-align:center;
  font-size:15px;
  font-weight:700;
  font-family:var(--font);
  font-variant-numeric:tabular-nums;
  background:#fff;
  border:1.5px solid var(--border);
  border-radius:7px;
  box-shadow:inset 0 1px 2px rgba(13,27,42,.04);
  flex:0 0 auto;
  transition:border-color .15s,box-shadow .15s,color .15s;
}
.field .cid-digit.filled{
  border-color:#a7f3d0;
  color:var(--green);
}
.field .cid-digit:focus{
  border-color:var(--green);
  box-shadow:0 0 0 3px var(--green-light);
}
.cid-sep{
  color:var(--muted);
  font-size:20px;
  font-weight:700;
  padding:0 1px;
  user-select:none;
  flex:0 0 auto;
}
.field.has-err .cid-panel{border-color:var(--red);background:var(--red-light)}
.field.has-err .cid-digit{border-color:var(--red)}

@media(max-width:380px){
  .box{padding:28px 14px 26px}
  .field .cid-digit{width:20px;height:36px;font-size:13px}
  .cid-panel{padding:12px 4px}
  .cid-boxes{gap:2px}
  .cid-sep{font-size:16px}
}

/* button */
.btn-login{
  width:100%;height:50px;
  background:var(--green);
  color:#fff;
  border:none;
  border-radius:var(--radius-sm);
  font-family:var(--font);
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:background .15s,opacity .15s;
  margin-top:4px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  letter-spacing:.3px;
}
.btn-login:hover{background:var(--green-hover)}
.btn-login:active{opacity:.88}
.btn-login:disabled{opacity:.6;cursor:not-allowed}

/* spinner */
.spinner{
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.35);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-login.loading .spinner{display:block}
.btn-login.loading .btn-label{display:none}

/* register */
.reg-row{
  text-align:center;
  margin-top:20px;
  font-size:13px;
  color:var(--muted);
  border-top:1px solid var(--border);
  padding-top:18px;
}
.reg-row a{
  color:var(--green);
  font-weight:600;
  text-decoration:none;
  margin-left:4px;
}
.reg-row a:hover{text-decoration:underline}

/* toast */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 20px;
  font-size:13px;color:var(--text);
  box-shadow:0 4px 20px rgba(0,0,0,.08);
  opacity:0;transition:all .22s ease;
  pointer-events:none;z-index:999;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{border-color:#f5c1c1;background:var(--red-light);color:var(--red)}

.btn-dashboard {
  background: #fff;
  color: var(--green);
  border: 1.5px solid var(--green);
  border-radius: 10px;
  padding: 10px;
  font-size: 14px;
  font-weight: 600;
  width: 100%;
  margin-top: 10px;
  transition: background .2s, color .2s;
  cursor: pointer;
}
.btn-dashboard:hover {
  background: var(--green-light);
}
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px 0 14px;
  color: var(--hint);
  font-size: 13px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.register-link {
  text-align: center;
  margin-top: 18px;
  font-size: 13px;
  color: var(--muted);
}
.register-link a { color: var(--green); text-decoration: none; font-weight: 600; }
.register-link a:hover { text-decoration: underline; }
#msg { min-height: 20px; text-align: center; font-size: 13px; margin-top: 8px; }
</style>
</head>

<body>
<div class="box">

  <div class="logo-wrap">
    <img src="logo.png" alt="VaxKolok DHB" onerror="this.style.display='none'">
    <div class="logo-text">
      <h2>Vax<span>Kolok</span>-DHB</h2>
      <p>ระบบติดตามวัคซีนเด็ก</p>
    </div>
  </div>

  <div class="divider"></div>

  <div class="field" id="fieldCid">
    <label class="cid-label">เลขบัตรประชาชน 13 หลัก</label>
    <div class="cid-panel">
      <div class="cid-boxes" id="cidBoxes">
        <input type="text" class="cid-digit" maxlength="1" inputmode="numeric" autocomplete="off" data-idx="0">
        <span class="cid-sep">-</span>
        <input type="text" class="cid-digit" maxlength="1" inputmode="numeric" autocomplete="off" data-idx="1">
        <input type="text" class="cid-digit" maxlength="1" inputmode="numeric" autocomplete="off" data-idx="2">
        <input type="text" class="cid-digit" maxlength="1" inputmode="numeric" autocomplete="off" data-idx="3">
        <input type="text" class="cid-digit" maxlength="1" inputmode="numeric" autocomplete="off" data-idx="4">
        <span class="cid-sep">-</span>
        <input type="text" class="cid-digit" maxlength="1" inputmode="numeric" autocomplete="off" data-idx="5">
        <input type="text" class="cid-digit" maxlength="1" inputmode="numeric" autocomplete="off" data-idx="6">
        <input type="text" class="cid-digit" maxlength="1" inputmode="numeric" autocomplete="off" data-idx="7">
        <input type="text" class="cid-digit" maxlength="1" inputmode="numeric" autocomplete="off" data-idx="8">
        <input type="text" class="cid-digit" maxlength="1" inputmode="numeric" autocomplete="off" data-idx="9">
        <span class="cid-sep">-</span>
        <input type="text" class="cid-digit" maxlength="1" inputmode="numeric" autocomplete="off" data-idx="10">
        <input type="text" class="cid-digit" maxlength="1" inputmode="numeric" autocomplete="off" data-idx="11">
        <span class="cid-sep">-</span>
        <input type="text" class="cid-digit" maxlength="1" inputmode="numeric" autocomplete="off" data-idx="12">
      </div>
    </div>
    <input type="hidden" id="cid">
    <div class="err" id="cidErr">กรุณากรอกเลขบัตรประชาชนให้ครบ 13 หลัก</div>
  </div>

  <button class="btn-login" id="loginBtn" onclick="login()">
    <div class="spinner"></div>
    <span class="btn-label">เข้าสู่ระบบ</span>
  </button>

  <div class="reg-row">
    ยังไม่มีบัญชี?
    <a href="register.html">สมัครสมาชิก</a>
  </div>

</div>

<!-- id="msg" ซ่อนไว้ให้ app.js ใช้ได้ปกติ -->
<p id="msg" style="display:none"></p>

<div id="toast"></div>

<script src="app.js"></script>
<script>
  function goDashboard() {
    window.location.href = 'dashboard.html';
  }
</script>
<script>
function clearErr() {
  document.getElementById("fieldCid").classList.remove("has-err");
}

let toastTimer;
function showToast(msg, isErr=false) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "show" + (isErr ? " err" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = "", 2800);
}

function setLoading(on) {
  const btn = document.getElementById("loginBtn");
  btn.disabled = on;
  btn.classList.toggle("loading", on);
}

// ดัก #msg ด้วย MutationObserver — ไม่ต้อง redefine innerText
const msgEl = document.getElementById("msg");
const msgObserver = new MutationObserver(() => {
  const val = msgEl.innerText.trim();
  if (!val) return;
  setLoading(false);
  const isErr = !val.includes("✅");
  if (val.includes("กรอก")) {
    document.getElementById("fieldCid").classList.add("has-err");
  }
  showToast(val, isErr);
  msgEl.innerText = "";
});
msgObserver.observe(msgEl, { childList: true, subtree: true, characterData: true });

// ─── ช่องกรอกเลขบัตรประชาชนแบบแยกทีละหลัก ──────────────────
// กันปัญหากรอกไม่ครบ 13 หลัก: แต่ละช่องรับได้ 1 ตัวเลข
// เลื่อนโฟกัสไปช่องถัดไปอัตโนมัติ, กด Backspace ในช่องว่างจะถอยไปช่องก่อนหน้า,
// วางเลขบัตรทั้งชุด (paste) จะกระจายตัวเลขลงแต่ละช่องให้อัตโนมัติ
const digitInputs = Array.from(document.querySelectorAll(".cid-digit"));
const hiddenCid    = document.getElementById("cid");

function syncHiddenCid() {
  hiddenCid.value = digitInputs.map(i => i.value).join("");
  clearErr();
}

digitInputs.forEach((inp, idx) => {
  inp.addEventListener("input", () => {
    inp.value = inp.value.replace(/[^0-9]/g, "").slice(-1);
    inp.classList.toggle("filled", !!inp.value);
    syncHiddenCid();
    if (inp.value && idx < digitInputs.length - 1) {
      digitInputs[idx + 1].focus();
    }
  });

  inp.addEventListener("keydown", e => {
    if (e.key === "Backspace" && !inp.value && idx > 0) {
      digitInputs[idx - 1].focus();
    } else if (e.key === "ArrowLeft" && idx > 0) {
      digitInputs[idx - 1].focus();
    } else if (e.key === "ArrowRight" && idx < digitInputs.length - 1) {
      digitInputs[idx + 1].focus();
    } else if (e.key === "Enter") {
      login();
    }
  });

  inp.addEventListener("paste", e => {
    e.preventDefault();
    const paste = (e.clipboardData || window.clipboardData).getData("text").replace(/\D/g, "");
    if (!paste) return;
    paste.split("").slice(0, digitInputs.length).forEach((d, i) => {
      if (digitInputs[idx + i]) {
        digitInputs[idx + i].value = d;
        digitInputs[idx + i].classList.add("filled");
      }
    });
    syncHiddenCid();
    const lastFilled = Math.min(idx + paste.length, digitInputs.length) - 1;
    if (digitInputs[lastFilled]) digitInputs[lastFilled].focus();
  });
});

if (digitInputs[0]) digitInputs[0].focus();

// Wrapper: validate + loading state ก่อนส่งให้ app.js
const _origLogin = window.login;
window.login = function() {
  clearErr();
  syncHiddenCid();
  const cid = hiddenCid.value.replace(/\D/g, "");
  if (cid.length !== 13) {
    document.getElementById("fieldCid").classList.add("has-err");
    return;
  }
  setLoading(true);
  if (typeof _origLogin === "function") _origLogin();
};
</script>
</body>
</html>
